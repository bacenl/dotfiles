windowrule = workspace 1 silent, match:class ^(vivaldi-stable|Vivaldi)$

$msgApps = org.telegram.desktop|vivaldi-web.whatsapp.com__-Default|discord
windowrule = group set always lock invade, workspace 4 silent, match:class ^($msgApps)$

$utilApps = vivaldi-calendar.google.com__calendar_-Default|vivaldi-www.gmail.com__-Default|vivaldi-outlook.office.com__mail_-Default
windowrule = group set always lock invade, workspace 5 silent, match:class ^($utilApps)$

# Extra autostart processes
exec-once = [workspace 1 silent] vivaldi
exec-once = [workspace 2 silent] ghostty
exec-once = [workspace 3 silent] nvim
exec-once = [workspace 4 silent] discord
exec-once = [workspace 4 silent] Telegram
exec-once = [workspace 4 silent] omarchy-launch-webapp 'https://web.whatsapp.com/'
exec-once = [workspace 5 silent] omarchy-launch-webapp "https://outlook.office.com/mail/"
exec-once = [workspace 5 silent] omarchy-launch-webapp "https://www.gmail.com/"
exec-once = [workspace 5 silent] omarchy-launch-webapp "https://calendar.google.com/calendar/"



