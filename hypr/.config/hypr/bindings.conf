# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, W, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT, H, Outlook, exec, omarchy-launch-webapp "https://outlook.office.com/mail/"
bindd = SUPER SHIFT, G, Gmail, exec, omarchy-launch-webapp "https://www.gmail.com/"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://calendar.google.com/calendar/"
bindd = SUPER SHIFT, T, Telegram, exec, Telegram
bindd = SUPER SHIFT, D, Telegram, exec, discord

# Overwrite move focus
unbind = SUPER, H
bindd = SUPER, H, Move window focus left, movefocus, l
unbind = SUPER, L
bindd = SUPER, L, Move window focus right, movefocus, r
unbind = SUPER, K
bindd = SUPER, K, Move window focus up, movefocus, u
unbind = SUPER, J
bindd = SUPER, J, Move window focus down, movefocus, d

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
unbind = SUPER SHIFT, H
bindd = SUPER SHIFT, H, Swap window to the left, swapwindow, l
unbind = SUPER SHIFT, L
bindd = SUPER SHIFT, L, Swap window to the right, swapwindow, r
unbind = SUPER SHIFT, K
bindd = SUPER SHIFT, K, Swap window up, swapwindow, u
unbind = SUPER SHIFT, J
bindd = SUPER SHIFT, J, Swap window down, swapwindow, d

# Join groups using vimmotions
bindd = SUPER ALT, H, Move window to group on left, moveintogroup, l
bindd = SUPER ALT, L, Move window to group on right, moveintogroup, r
bindd = SUPER ALT, K, Move window to group on top, moveintogroup, u
bindd = SUPER ALT, J, Move window to group on bottom, moveintogroup, d

# Change to M for Manual
unbind = SUPER, M
bindd = SUPER, M, show key bindings, exec, omarchy-menu-keybindings

# Change to R for Reverse
unbind = SUPER, R
bindd = SUPER, R, Toggle window split, togglesplit, # dwindle

# Change to SUPER ALT for consistency with other "MOVE WINDOW TO WORKSPACE"
unbind = SUPER ALT, S
bindd = SUPER SHIFT, S, Move window to scratchpad, movetoworkspacesilent, special:scratchpad

# Move active window silently to a workspace with SUPER + SHIFT + ALT + [1-9; 0]
unbind = SUPER SHIFT ALT, code:10
unbind = SUPER SHIFT ALT, code:11
unbind = SUPER SHIFT ALT, code:12
unbind = SUPER SHIFT ALT, code:13
unbind = SUPER SHIFT ALT, code:14
unbind = SUPER SHIFT ALT, code:15
unbind = SUPER SHIFT ALT, code:16
unbind = SUPER SHIFT ALT, code:17
unbind = SUPER SHIFT ALT, code:18
unbind = SUPER SHIFT ALT, code:19

# For fun lol
bindd = SUPER CTRL, RETURN, Activity, exec, omarchy-launch-tui btop

# Fix brightness adjustment not working
bindel = , F3, exec, $osdclient --brightness lower
bindel = , F4, exec, $osdclient --brightness raise

unbind = SUPER SHIFT, S
bindd = SUPER SHIFT, S, Screenshot to clipboard, exec, omarchy-cmd-screenshot smart clipboard

unbind = SUPER, S
unbind = SUPER, Q
unbind = SUPER SHIFT, Q
bindd = SUPER, Q, Toggle scratchpad, togglespecialworkspace, scratchpad
bindd = SUPER ALT, Q, Move window to scratchpad, movetoworkspacesilent, special:scratchpad
